services:
  polymarket:
    build: .
    container_name: polymarket-data
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      ALCHEMY_API_KEY: ${ALCHEMY_API_KEY:-}
      POLYGON_RPC_URL: ${POLYGON_RPC_URL:-https://polygon.llamarpc.com}
      BATCH_SIZE: ${BATCH_SIZE:-100}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["--host", "0.0.0.0", "--port", "8000", "--batch-size", "${BATCH_SIZE:-100}"]
    stop_grace_period: 30s

  import:
    build: .
    container_name: polymarket-import
    profiles:
      - tools
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    entrypoint: ["python", "-m", "polymarket.db.import_parquet"]
    command: ["--memory", "4GB", "--threads", "4", "--sleep", "0.3"]
